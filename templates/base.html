<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini Shop</title>
</head>
<body>

<header>
    <h1><a href="/">Mini Shop</a></h1>

    <nav>
        <a href="/">Produits.html</a> |
        <a href="/cart/">Panier</a> |
        <a href="/orders/create/">Commander</a> |

        {% if user.is_authenticated %}
            Bonjour, {{ user.username }} |
            <a href="{% url 'logout' %}?next=/">Se déconnecter</a>
        {% else %}
            <a href="{% url 'login' %}">Se connecter</a>
        {% endif %}
    </nav>
    <hr>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
